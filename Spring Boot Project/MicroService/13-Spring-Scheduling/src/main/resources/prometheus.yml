global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'spring-app'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['localhost:8080']


groups:
  - name: scheduler-alerts
    rules:
      - alert: EmailJobFailing
        expr: increase(email_job_failure[1m]) > 3
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Email job failing repeatedly"