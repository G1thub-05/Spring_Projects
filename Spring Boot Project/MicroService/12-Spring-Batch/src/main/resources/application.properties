spring.application.name=13-Spring-Batch


# DATASOURCE CONFIGURATION
spring.datasource.url=jdbc:mysql://localhost:3306/my_batch_db
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root


# H2 CONSOLE (Optional)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA (If not using JPA, can remove)
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true


#Spring Batch creates its own metadata tables using:
spring.batch.jdbc.initialize-schema=always

# schema-all.sql ? Table will be created automatically.
spring.sql.init.mode=always

# That auto-launches  all Jobs on application startup if true.
spring.batch.job.enabled=false

# LOGGING
logging.level.org.springframework.batch=INFO
logging.level.org.springframework.jdbc=INFO

# Batch
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true